<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kirk Building Consultancy</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:   #0D1F3C;
      --teal:   #006E8C;
      --orange: #D85C1A;
      --offwhite: #F5F4F0;
      --mid:    #8A9BAD;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--offwhite);
      color: var(--navy);
      font-family: Calibri, 'Gill Sans', 'Trebuchet MS', sans-serif;
      font-size: 18px;
      line-height: 1.65;
      min-height: 100vh;
    }

    header {
      background: var(--navy);
      padding: 2.4rem 2rem 2.2rem;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .wordmark { display: flex; flex-direction: column; gap: 0.25rem; }

    .wordmark-name {
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #fff;
    }

    .wordmark-strapline {
      font-size: 1rem;
      color: var(--teal);
      letter-spacing: 0.04em;
    }
